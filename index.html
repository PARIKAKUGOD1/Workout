<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Amit Protocol">
    <meta name="theme-color" content="#000000">
    <title>Amit Protocol</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" sizes="512x512" href="./icon.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Switched to highly reliable JSDelivr Network to prevent Boot Freezes -->
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        // Catch any raw CDN loading errors and print them to the fallback screen
        window.onerror = function(msg, url, lineNo) {
            var fbMsg = document.getElementById('fb-msg');
            if (fbMsg) fbMsg.innerHTML += '<br><br><span style="color:#ff453a; font-size:11px;">System Error: ' + msg + ' (Line ' + lineNo + ')</span>';
            return false;
        };

        // Bulletproof Cache Flush Function
        function forceSystemReset() {
            try {
                localStorage.clear();
                sessionStorage.clear();
                var btn = document.getElementById('reset-btn');
                if (btn) btn.innerText = 'REBOOTING...';
                var msg = document.getElementById('fb-msg');
                if (msg) msg.innerHTML = '<span style="color:#34C759; font-weight:bold; font-size:14px;">Memory flushed. Reloading protocol...</span>';
                
                setTimeout(function() {
                    window.location.href = window.location.pathname + '?v=' + new Date().getTime();
                }, 600);
            } catch(e) {
                alert('Reset failed. Please clear browser history manually. Error: ' + e.message);
            }
        }
    </script>

    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden; 
            overscroll-behavior-y: none; 
            font-family: 'Inter', sans-serif;
        }
        .font-space { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        @keyframes slideDown { from { transform: translate(-50%, -30px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        @keyframes slideUpFullScreen { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes zoomInIsland { from { transform: translate(-50%, -10px) scale(0.95); opacity: 0; } to { transform: translate(-50%, 0) scale(1); opacity: 1; } }
        @keyframes zoomInModal { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseOpacity { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .animate-slide-down { animation: slideDown 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-slide-up-full { animation: slideUpFullScreen 0.4s cubic-bezier(0.32, 0.72, 0, 1) forwards; }
        .animate-zoom-in-island { animation: zoomInIsland 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-zoom-in-modal { animation: zoomInModal 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        .glow-pulse { animation: pulseOpacity 2.5s infinite ease-in-out; }
        
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }
        .ripple-effect { position: absolute; border-radius: 50%; transform: scale(0); animation: ripple-anim 0.6s linear; background-color: rgba(255, 255, 255, 0.25); pointer-events: none; z-index: 0; }
        
        .active-press { transition: transform 0.15s ease, opacity 0.15s ease; }
        .active-press:active { transform: scale(0.96); opacity: 0.8; }
        
        .safe-pt { padding-top: max(env(safe-area-inset-top), 20px); }
        .safe-pb { padding-bottom: max(env(safe-area-inset-bottom), 20px); }
    </style>
</head>
<body>
    <div id="root">
        <!-- Emergency Fallback Screen -->
        <div style="display:flex; height:100vh; width:100vw; background:#000; color:#fff; align-items:center; justify-content:center; flex-direction:column; font-family:sans-serif; text-align:center; padding:20px;">
            <h2 style="color:#0A84FF; font-weight:900; letter-spacing:3px; text-transform:uppercase; margin-bottom:10px;">System Booting...</h2>
            <p id="fb-msg" style="color:#888; font-size:12px; margin-bottom:30px;">If this screen remains frozen, tap below to flush cache.</p>
            <button id="reset-btn" onclick="forceSystemReset()" style="padding:15px 30px; background:#111; border:1px solid #333; color:#ff453a; border-radius:20px; font-weight:bold; letter-spacing:2px; text-transform:uppercase; cursor:pointer;">Force Reset</button>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef, memo, useCallback } = React;

        const triggerRipple = (e) => {
            const btn = e.currentTarget;
            const rect = btn.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            const circle = document.createElement('span');
            const diameter = Math.max(btn.clientWidth, btn.clientHeight);
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${x - diameter/2}px`;
            circle.style.top = `${y - diameter/2}px`;
            circle.classList.add('ripple-effect');
            
            btn.appendChild(circle);
            setTimeout(() => circle.remove(), 600);
        };

        const AudioEngine = {
            ctx: null, unlocked: false,
            init() {
                try {
                    if (!window.AudioContext && !window.webkitAudioContext) return null;
                    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    if (this.ctx.state === 'suspended') this.ctx.resume();
                    return this.ctx;
                } catch(e) { return null; }
            },
            unlock() {
                try {
                    if (this.unlocked) return;
                    const ctx = this.init();
                    if (!ctx) return;
                    const osc = ctx.createOscillator();
                    osc.connect(ctx.destination);
                    osc.start(0); osc.stop(0.001); 
                    this.unlocked = true;
                } catch(e) {}
            },
            playNote(freq, startTimeOffset, duration, type='sine', vol=0.3) {
                try {
                    if (!this.unlocked) return;
                    const ctx = this.init();
                    if (!ctx) return;
                    const t = ctx.currentTime + startTimeOffset;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(vol, t + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(t); osc.stop(t + duration);
                } catch(e) {}
            },
            tap() { this.playNote(600, 0, 0.08, 'sine', 0.3); },
            open() { this.playNote(400, 0, 0.15, 'sine', 0.3); this.playNote(600, 0.05, 0.2, 'sine', 0.3); },
            close() { this.playNote(600, 0, 0.15, 'sine', 0.3); this.playNote(400, 0.05, 0.2, 'sine', 0.3); },
            success() { this.playNote(440, 0, 0.25, 'sine', 0.4); this.playNote(554.37, 0.08, 0.4, 'sine', 0.4); },
            toggleOn() { this.playNote(400, 0, 0.1, 'sine', 0.3); this.playNote(600, 0.06, 0.15, 'sine', 0.3); },
            toggleOff() { this.playNote(600, 0, 0.1, 'sine', 0.3); this.playNote(400, 0.06, 0.15, 'sine', 0.3); },
            boot() { 
                try {
                    if (!this.unlocked) this.unlock();
                    const ctx = this.init();
                    if (!ctx) return;
                    const t = ctx.currentTime;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(150, t);
                    osc.frequency.exponentialRampToValueAtTime(40, t + 0.6);
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.7, t + 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(t); osc.stop(t + 0.8);
                    if ('vibrate' in navigator) navigator.vibrate([50, 100, 150]);
                } catch(e) {}
            },
            start() { 
                try {
                    if (!this.unlocked) this.unlock();
                    const ctx = this.init();
                    if (!ctx) return;
                    const t = ctx.currentTime;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(250, t);
                    osc.frequency.exponentialRampToValueAtTime(30, t + 0.7);
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.6, t + 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(t); osc.stop(t + 0.7);
                    if ('vibrate' in navigator) navigator.vibrate([100, 50, 100]);
                } catch(e) {}
            },
            timerFinish() {
                this.playNote(783.99, 0, 0.5, 'sine', 0.6); 
                this.playNote(1046.50, 0.2, 0.8, 'sine', 0.6); 
                if ('vibrate' in navigator) navigator.vibrate([150, 50, 150]);
            }
        };

        const Icon = ({ d, points, rects, circles, lines, polylines, size=24, className="", style={} }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>
                {d && <path d={d} />} {points && <polygon points={points} />}
                {polylines && polylines.map((p, i) => <polyline key={i} points={p} />)}
                {circles && circles.map((c, i) => <circle key={i} cx={c.cx} cy={c.cy} r={c.r} />)}
                {lines && lines.map((l, i) => <line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} />)}
                {rects && rects.map((r, i) => <rect key={i} x={r.x} y={r.y} width={r.w} height={r.h} rx={r.rx} ry={r.ry} />)}
            </svg>
        );

        const Play = (p) => <Icon {...p} points="5 3 19 12 5 21 5 3"/>;
        const CheckCircle = (p) => <Icon {...p} d="M22 11.08V12a10 10 0 1 1-5.93-9.14" polylines={["22 4 12 14.01 9 11.01"]}/>;
        const Clock = (p) => <Icon {...p} circles={[{cx:12, cy:12, r:10}]} polylines={["12 6 12 12 16 14"]}/>;
        const TrendingUp = (p) => <Icon {...p} polylines={["23 6 13.5 15.5 8.5 10.5 1 18", "17 6 23 6 23 12"]}/>;
        const ChevronRight = (p) => <Icon {...p} polylines={["9 18 15 12 9 6"]}/>;
        const ChevronDown = (p) => <Icon {...p} polylines={["6 9 12 15 18 9"]}/>;
        const Check = (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p.strokeWidth||2} strokeLinecap="round" strokeLinejoin="round" className={p.className}><polyline points="20 6 9 17 4 12"/></svg>;
        const Info = (p) => <Icon {...p} circles={[{cx:12, cy:12, r:10}]} lines={[{x1:12,y1:16,x2:12,y2:12}, {x1:12,y1:8,x2:12.01,y2:8}]}/>;
        const X = (p) => <Icon {...p} lines={[{x1:18,y1:6,x2:6,y2:18}, {x1:6,y1:6,x2:18,y2:18}]}/>;
        const Activity = (p) => <Icon {...p} polylines={["22 12 18 12 15 21 9 3 6 12 2 12"]}/>;
        const Droplet = (p) => <Icon {...p} d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>;
        const Flame = (p) => <Icon {...p} d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>;
        const Minimize2 = (p) => <Icon {...p} polylines={["4 14 10 14 10 20", "20 10 14 10 14 4"]} lines={[{x1:14,y1:10,x2:21,y2:3}, {x1:3,y1:21,x2:10,y2:14}]}/>;
        const Cpu = (p) => <Icon {...p} rects={[{x:4,y:4,w:16,h:16,rx:2,ry:2}, {x:9,y:9,w:6,h:6,rx:0,ry:0}]} lines={[{x1:9,y1:1,x2:9,y2:4},{x1:15,y1:1,x2:15,y2:4},{x1:9,y1:20,x2:9,y2:23},{x1:15,y1:20,x2:15,y2:23},{x1:20,y1:9,x2:23,y2:9},{x1:20,y1:14,x2:23,y2:14},{x1:1,y1:9,x2:4,y2:9},{x1:1,y1:14,x2:4,y2:14}]}/>;
        const Fingerprint = (p) => <Icon {...p} d="M2 12C2 6.48 6.48 2 12 2s10 4.48 10 10 M5 12c0-3.87 3.13-7 7-7s7 3.13 7 7 M8 12c0-2.21 1.79-4 4-4s4 1.79 4 4 M11 12c0-.55.45-1 1-1s1 .45 1 1"/>;
        const ShieldCheck = (p) => <Icon {...p} d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" polylines={["9 12 11 14 15 10"]}/>;
        const Radar = (p) => <Icon {...p} circles={[{cx:12,cy:12,r:10}, {cx:12,cy:12,r:6}, {cx:12,cy:12,r:2}]} lines={[{x1:12,y1:12,x2:22,y2:12}]}/>;
        const RotateCcw = (p) => <Icon {...p} polylines={["1 4 1 10 7 10"]} d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>;
        const BookOpen = (p) => <Icon {...p} d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>;

        const ActivityRing = ({ active, color }) => {
            const radius = 10;
            const circumference = 2 * Math.PI * radius; 
            const offset = active ? 0 : circumference;
            return (
                <div className="relative w-7 h-7 mr-4 flex-shrink-0">
                    <svg className="w-full h-full transform -rotate-90" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.05)" strokeWidth="2.5" fill="none" />
                        <circle cx="12" cy="12" r="10" stroke={color} strokeWidth="2.5" fill="none" 
                                strokeDasharray={circumference} strokeDashoffset={offset} 
                                className="transition-all duration-700 ease-out" strokeLinecap="round" />
                    </svg>
                    {active && <Check size={12} strokeWidth={4} className="absolute inset-0 m-auto z-10 animate-zoom-in-modal" style={{color, filter: `drop-shadow(0 0 4px ${color})`}} />}
                </div>
            )
        };

        const formatTime = (secs) => `${Math.floor(secs / 60)}:${(secs % 60).toString().padStart(2, '0')}`;

        const DynamicIslandTimer = ({ timerState, skipTimer, toggleTimerMinimize, adjustTimer }) => {
            const [timeLeft, setTimeLeft] = useState(0);

            useEffect(() => {
                if (!timerState.active || !timerState.endTime) return;
                const updateTime = () => {
                    const remaining = Math.max(0, Math.round((timerState.endTime - Date.now()) / 1000));
                    setTimeLeft(remaining);
                };
                updateTime();
                const int = setInterval(updateTime, 1000);
                return () => clearInterval(int);
            }, [timerState.active, timerState.endTime]);

            if (!timerState.active) return null;

            if (timerState.minimized) {
                return (
                    <div onClick={toggleTimerMinimize} className="fixed left-1/2 bg-[#111113]/90 backdrop-blur-xl border border-white/20 text-white px-5 py-2.5 rounded-full flex items-center justify-center gap-3 shadow-[0_10px_40px_rgba(0,0,0,0.8)] z-[999] cursor-pointer active-press transition-all animate-slide-down" 
                         style={{ transform: 'translateX(-50%)', top: 'calc(env(safe-area-inset-top, 12px) + 12px)' }}>
                        <Clock size={16} className="text-[#0A84FF] animate-pulse" />
                        <span className="font-space font-bold text-sm tracking-widest">{formatTime(timeLeft)}</span>
                    </div>
                );
            }
            return (
                <div className="fixed left-1/2 w-[92vw] max-w-sm bg-[#111113]/95 backdrop-blur-3xl border border-white/20 p-6 rounded-[32px] shadow-[0_30px_60px_rgba(0,0,0,0.95)] z-[999] flex flex-col items-center animate-zoom-in-island" 
                     style={{ transform: 'translateX(-50%)', top: 'calc(env(safe-area-inset-top, 12px) + 12px)' }}>
                    <div className="w-full flex justify-between items-center mb-4">
                        <button onClick={skipTimer} className="text-[#8e8e93] hover:text-[#ff453a] p-3 bg-white/5 rounded-full transition-colors active-press"><X size={18} /></button>
                        <h3 className="text-[#0A84FF] text-[11px] font-bold uppercase tracking-[0.2em] font-space">{timerState.label}</h3>
                        <button onClick={toggleTimerMinimize} className="text-[#8e8e93] hover:text-white p-3 bg-white/5 rounded-full transition-colors active-press"><Minimize2 size={18} /></button>
                    </div>
                    <div className="text-[72px] font-black tracking-tighter mb-6 font-space text-white leading-none drop-shadow-[0_0_15px_rgba(10,132,255,0.3)]">{formatTime(timeLeft)}</div>
                    <div className="flex space-x-3 w-full">
                        <button onClick={() => adjustTimer(-10)} className="flex-1 bg-black active-press py-4 rounded-[20px] font-bold text-sm text-[#8e8e93] border border-white/10 font-space">-10s</button>
                        <button onClick={() => adjustTimer(30)} className="flex-1 bg-black active-press py-4 rounded-[20px] font-bold text-sm text-[#8e8e93] border border-white/10 font-space">+30s</button>
                    </div>
                </div>
            );
        };

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, errorMsg: '' }; }
            static getDerivedStateFromError(error) { return { hasError: true, errorMsg: error.toString() }; }
            componentDidCatch(error, errorInfo) { console.error("System Failure Captured:", error); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{minHeight:'100vh', width:'100vw', backgroundColor:'#000', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'20px', textAlign:'center', fontFamily:'Space Grotesk, sans-serif', zIndex:9999, position:'fixed', top:0, left:0}}>
                            <div style={{width:'80px', height:'80px', borderRadius:'40px', backgroundColor:'rgba(255,69,58,0.1)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:'24px', border:'2px solid rgba(255,69,58,0.3)'}}>
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ff453a" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
                            </div>
                            <h1 style={{color:'#fff', fontSize:'28px', fontWeight:'900', letterSpacing:'4px', marginBottom:'12px'}}>SYSTEM CRASH</h1>
                            <p style={{color:'#8e8e93', fontSize:'13px', marginBottom:'40px', maxWidth:'80%', wordWrap:'break-word', lineHeight:'1.5', fontFamily:'Inter, sans-serif'}}>
                                A fatal error occurred: {this.state.errorMsg}<br/><br/>
                                The system caught the crash to prevent a blackout. Please reset your memory cache.
                            </p>
                            <button onClick={() => { try{localStorage.clear(); sessionStorage.clear();}catch(e){} window.location.href = window.location.pathname + '?v=' + new Date().getTime(); }} style={{backgroundColor:'rgba(255,69,58,0.2)', color:'#ff453a', fontWeight:'900', padding:'18px 40px', borderRadius:'24px', border:'1px solid rgba(255,69,58,0.4)', textTransform:'uppercase', letterSpacing:'2px'}}>
                                INITIATE HARD RESET
                            </button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const ABS_MODULE = [
          { 
            id: 'abs1', name: 'Heavy Cable Crunches', sets: 3, reps: '15-20', rest: 60, 
            note: '1 Warmup Set + 2 Heavy Sets to Failure. Use heavy resistance to force blocky definition.', cue: 'Squeeze at bottom for 1s',
            target: 'Rectus Abdominis (Upper Abs)',
            setup: 'Attach a rope handle to a high cable pulley station. Kneel down facing or away from the stack.',
            steps: ['Hold rope by ears.', 'Crunch downward by curving the thoracic spine.', 'Bring elbows towards thighs.', 'Control back up slowly.']
          },
          { 
            id: 'abs2', name: 'Hanging Leg Raises', sets: 3, reps: 'Failure', rest: 60, 
            note: '1 Warmup Set + 2 Heavy Sets to Failure. Do not swing your body or use momentum.', cue: 'Control eccentric (3s down)',
            target: 'Lower Rectus Abdominis & Obliques',
            setup: 'Hang completely straight from a pull-up bar with a standard overhand grip.',
            steps: ['Brace core to stop body swing.', 'Raise legs up past 90 degrees strictly using pelvic rotation.', 'Pause at top contraction.', 'Lower slowly over 3 seconds.']
          },
          { 
            id: 'abs3', name: 'Weighted Planks', sets: 3, reps: '60s+', rest: 60, 
            note: 'Core stability foundation. Place a plate safely on your back or have your partner position it.', cue: 'Keep core tight, no sagging',
            target: 'Transversus Abdominis (Deep Core Alignment)',
            setup: 'Assume a standard forearm plank position. Place weight flat on upper glutes/lower back.',
            steps: ['Keep elbows stacked beneath shoulders.', 'Create a straight line from heels to head.', 'Squeeze glutes and draw belly button inward.', 'Hold posture strictly for 60 seconds.']
          }
        ];

        // 2xF PROTOCOL IMPLEMENTED & LOW-TO-HIGH CABLES ADDED
        const WORKOUT_PLAN = [
          {
            day: 1, name: 'Monday', focus: 'Chest & Triceps', type: 'Push Block', tip: 'Execute 2xF Protocol: 1 Warmup set, then 2 sets to absolute mechanical failure.',

                                    </div>
                                    <div>
                                        <p className="text-[#0A84FF] text-[9px] font-mono tracking-[0.2em] uppercase mb-0.5 font-bold">System Online</p>
                                        <h1 className="font-space text-[28px] font-black text-white tracking-tight leading-tight">{getGreeting()},<br/>Amit.</h1>
                                    </div>
                                </div>
                                <button onClick={hardReset} className="relative overflow-hidden p-3 bg-white/5 rounded-full text-[#8e8e93] border border-white/10 active-press hover:text-white transition-colors"><RotateCcw size={16} className="relative z-10"/></button>
                            </div>
                            <div className="grid grid-cols-2 gap-3 mb-2">
                                <div className="bg-[#111113]/80 border border-white/10 p-4 rounded-[24px]">
                                    <div className="flex items-center gap-2 mb-1.5">
                                        <ShieldCheck size={14} className="text-[#34C759]" />
                                        <p className="text-[#8e8e93] text-[9px] font-mono tracking-widest uppercase font-bold">System Status</p>
                                    </div>
                                    <p className="font-space text-white font-black text-sm tracking-wide">OPTIMAL</p>
                                </div>
                                <div className="bg-[#111113]/80 border border-white/10 p-4 rounded-[24px]">
                                    <div className="flex items-center gap-2 mb-1.5">
                                        <Radar size={14} className="text-[#0A84FF] animate-spin-slow" />
                                        <p className="text-[#8e8e93] text-[9px] font-mono tracking-widest uppercase font-bold">Current Phase</p>
                                    </div>
                                    <p className="font-space text-white font-black text-sm tracking-wide">HYPERTROPHY</p>
                                </div>
                            </div>
                        </div>

                        <div className="px-6 mt-2 overflow-x-auto no-scrollbar relative z-10 animate-fade-in-up" style={{ animationDelay: '0.2s' }}>
                            <div className="flex space-x-3 pb-2 w-max">
                                {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map((dayStr, idx) => (
                                    <button key={idx} onClick={(e) => { triggerRipple(e); AudioEngine.tap(); updateState({ selectedDay: idx }); }} 
                                        className={`relative overflow-hidden active-press flex flex-col items-center justify-center w-[72px] h-[90px] rounded-[28px] transition-all duration-300 ${appState.selectedDay === idx ? 'bg-[#0A84FF] text-white shadow-[0_8px_16px_rgba(10,132,255,0.25)] border border-[#0A84FF]/50' : 'bg-[#111113]/80 text-[#8e8e93] border border-white/10 hover:bg-[#1c1c1e]'}`}>
                                        <span className="text-[10px] font-bold uppercase tracking-widest mb-1 relative z-10">{dayStr}</span>
                                        <span className={`font-space text-2xl font-black relative z-10 ${appState.selectedDay === idx ? 'text-white' : 'text-[#f2f2f7]'}`}>{idx}</span>
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="px-6 mt-8 relative z-10 animate-fade-in-up" style={{ animationDelay: '0.3s' }}>
                            <div className="bg-[#111113]/90 rounded-[36px] p-8 border-t-2 border-t-[#0A84FF] border-x border-b border-white/10 relative overflow-hidden shadow-2xl">
                                <p className="text-[#8e8e93] text-[10px] font-mono tracking-[0.2em] uppercase mb-2 font-bold">Today's Directive</p>
                                <h2 className="font-space text-[32px] font-black mb-1 leading-tight tracking-tight">{todayPlan.focus}</h2>
                                <div className="flex items-center text-[#0A84FF] text-xs font-bold tracking-[0.15em] uppercase mb-8">
                                    <Cpu size={14} className="mr-2" /> {todayPlan.type}
                                </div>
                                {todayPlan.exercises.length > 0 ? (
                                    <>
                                        <div className="mb-8 relative z-10">
                                            <div onClick={(e) => { triggerRipple(e); appState.includeAbs ? AudioEngine.toggleOff() : AudioEngine.toggleOn(); updateState({ includeAbs: !appState.includeAbs }); }} 
                                                 className="relative overflow-hidden flex items-center justify-between bg-black/50 p-4 rounded-[20px] border border-white/5 cursor-pointer active-press transition-transform">
                                                <div className="flex items-center relative z-10">
                                                    <div className={`w-6 h-6 rounded-lg flex items-center justify-center mr-4 transition-colors ${appState.includeAbs ? 'bg-[#0A84FF]' : 'bg-[#2c2c2e]'}`}>
                                                        {appState.includeAbs && <Check size={14} strokeWidth={3} className="text-white" />}
                                                    </div>
                                                    <span className="font-semibold text-sm">Attach Core Module</span>
                                                </div>
                                            </div>
                                        </div>
                                        <button onClick={(e) => beginWorkout(appState.selectedDay, e)} className="relative overflow-hidden w-full bg-white text-black font-black text-[13px] uppercase tracking-[0.2em] py-5 rounded-[24px] flex items-center justify-center shadow-[0_0_40px_rgba(255,255,255,0.4)] active-press transition-all glow-pulse">
                                            <Play size={16} className="mr-2 relative z-10" /> <span className="relative z-10 font-space">INITIATE PROTOCOL</span>
                                        </button>
                                    </>
                                ) : (
                                    <div className="py-10 text-center text-[#8e8e93]">
                                        <ShieldCheck size={48} className="mx-auto mb-4 opacity-20" />
                                        <p className="font-bold text-white">System in Recovery</p>
                                        <p className="text-[10px] mt-2 uppercase tracking-[0.2em] font-mono">Tissue Repair Phase Active</p>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="px-6 mt-10 mb-10 relative z-10">
                            <h3 className="text-[10px] font-mono text-[#8e8e93] uppercase tracking-[0.2em] mb-4 pl-2 font-bold animate-fade-in-up" style={{ animationDelay: '0.4s' }}>Biometric Uplink</h3>
                            <div className="bg-[#111113]/80 rounded-[36px] p-3 border border-white/10 shadow-lg">
                                {[
                                    { id: 'cals', label: '3,500 KCAL Payload', icon: <Flame size={16} className="text-[#FF9500]"/>, color: '#FF9500' },
                                    { id: 'protein', label: '150g+ Protein Synthesis', icon: <TrendingUp size={16} className="text-[#34C759]"/>, color: '#34C759' },
                                    { id: 'shake', label: '1,200 Calorie Infusion', icon: <Droplet size={16} className="text-[#32ADE6]"/>, color: '#32ADE6' },
                                    { id: 'sleep', label: '9+ Hours REM Phase', icon: <Clock size={16} className="text-[#AF52DE]"/>, color: '#AF52DE' }
                                ].map((item, idx) => (
                                    <div key={item.id} onClick={(e) => toggleChecklist(item.id, e)} className="relative overflow-hidden animate-fade-in-up flex items-center p-4 hover:bg-white/5 rounded-[28px] cursor-pointer transition-colors active-press" style={{ animationDelay: `${0.5 + (idx * 0.1)}s` }}>
                                        <ActivityRing active={appState.checklist[item.id]} color={item.color} />
                                        <div className="bg-[#1c1c1e] p-2.5 rounded-2xl mr-4 border border-white/5 relative z-10">{item.icon}</div>
                                        <span className={`font-bold text-sm relative z-10 ${appState.checklist[item.id] ? 'text-white/40 line-through' : 'text-white'}`}>{item.label}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderWorkoutList = () => {
                if (!appState.activeWorkout || !appState.activeWorkout.exercises) return null;
                let totalSets = 0; let completedSets = 0;
                appState.activeWorkout.exercises.forEach(ex => { totalSets += ex.sets; for(let i=0; i<ex.sets; i++) { if(appState.setLogs[ex.id]?.[i]?.completed) completedSets++; } });
                const progressPercent = totalSets === 0 ? 0 : Math.round((completedSets / totalSets) * 100);

                return (
                    <div className="w-full min-h-screen pb-40 bg-black animate-fade-in relative z-10">
                        <div className="sticky top-0 z-40 bg-black/95 border-b border-white/10 safe-pt pb-4 px-6 flex flex-col gap-4">
                            <div className="flex justify-between items-center mt-2">
                                <div>
                                    <h2 className="text-[10px] font-bold text-[#0A84FF] uppercase tracking-[0.2em] mb-1 font-mono">{appState.activeWorkout.type}</h2>
                                    <h1 className="font-space text-[28px] font-black tracking-tight leading-none">{appState.activeWorkout.focus}</h1>
                                </div>
                                <button onClick={(e) => { triggerRipple(e); AudioEngine.tap(); setShowAbortModal(true); }} className="relative overflow-hidden bg-[#111] text-[#ff453a] text-[11px] font-bold uppercase tracking-wider px-5 py-3 rounded-[20px] border border-white/10 active-press transition-all"><span className="relative z-10">Abort</span></button>
                            </div>
                            <div className="w-full h-1.5 bg-[#1c1c1e] rounded-full overflow-hidden flex">
                                <div className="h-full bg-[#0A84FF] transition-all duration-500 shadow-[0_0_15px_rgba(10,132,255,0.8)]" style={{ width: `${progressPercent}%` }}></div>
                            </div>
                        </div>

                        <div className="px-6 py-6 space-y-4 relative z-10">
                            <p className="text-[10px] font-mono text-[#8e8e93] uppercase tracking-[0.2em] mb-2 font-bold">Protocol Architecture</p>
                            {appState.activeWorkout.exercises.map((ex, exIndex) => {
                                const exerciseLogs = appState.setLogs[ex.id] || {};
                                let exCompletedSets = 0;
                                for(let i=0; i<ex.sets; i++) if (exerciseLogs[i]?.completed) exCompletedSets++;
                                const allCompleted = exCompletedSets === ex.sets;

                                return (
                                    <div key={ex.id} 
                                        className={`relative overflow-hidden p-5 rounded-[32px] border transition-all duration-300 flex items-center justify-between shadow-lg ${allCompleted ? 'bg-black/50 border-white/5 opacity-60' : 'bg-[#111] border-white/10 hover:border-white/20'}`}>
                                        
                                        {/* Main Execution Body */}
                                        <div onClick={(e) => { triggerRipple(e); AudioEngine.open(); updateState({ focusedExercise: exIndex }); }} className="flex items-center gap-4 flex-1 min-w-0 cursor-pointer active-press">
                                            <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black font-space text-lg border transition-all ${allCompleted ? 'bg-[#34C759]/10 text-[#34C759] border-[#34C759]/30 shadow-[0_0_15px_rgba(52,199,89,0.2)]' : 'bg-[#0A84FF]/10 text-[#0A84FF] border-[#0A84FF]/30'}`}>
                                                {allCompleted ? <Check size={20} strokeWidth={3}/> : exIndex + 1}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <h3 className={`font-bold text-[16px] leading-tight mb-1 tracking-tight truncate ${allCompleted ? 'line-through text-[#8e8e93]' : 'text-white'}`}>{ex.name}</h3>
                                                <p className="text-[#8e8e93] text-[10px] font-bold tracking-[0.2em] uppercase font-mono">{exCompletedSets} / {ex.sets} Sets Done</p>
                                            </div>
                                        </div>

                                        {/* Dedicated Intel / Description Symbol Button */}
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); triggerRipple(e); AudioEngine.open(); setIntelModalExercise(ex); }}
                                            className="p-3 ml-2 bg-white/5 border border-white/10 text-cyan-400 rounded-full hover:bg-white/10 hover:text-white active-press transition-colors shrink-0"
                                            title="View Exercise Breakdown"
                                        >
                                            <BookOpen size={16} />
                                        </button>
                                    </div>
                                );
                            })}
                        </div>
                        
                        <div className="px-6 pb-12 mt-8 animate-fade-in-up relative z-10">
                            <button onClick={(e) => { triggerRipple(e); AudioEngine.success(); endWorkout(); }} className="relative overflow-hidden w-full bg-[#0A84FF] text-white font-black text-[13px] uppercase tracking-[0.2em] py-5 rounded-[24px] flex items-center justify-center shadow-[0_10px_40px_rgba(10,132,255,0.4)] active-press transition-all">
                                <CheckCircle size={18} className="mr-2 relative z-10" /> <span className="relative z-10 font-space">Complete Session</span>
                            </button>
                        </div>
                    </div>
                );
            };

            const renderFocusMode = () => {
                if (typeof appState.focusedExercise !== 'number' || !appState.activeWorkout || !appState.activeWorkout.exercises || !appState.activeWorkout.exercises[appState.focusedExercise]) return null;
                const ex = appState.activeWorkout.exercises[appState.focusedExercise];
                const exerciseLogs = appState.setLogs[ex.id] || {};
                
                return (
                    <div className="fixed inset-0 bg-[#000] z-[60] overflow-y-auto animate-slide-up-full pb-40">
                        <div className="sticky top-0 bg-black/95 z-[70] border-b border-white/10 safe-pt px-6 pb-4 flex justify-between items-center">
                            <div className="mt-2">
                                <p className="text-[#8e8e93] text-[10px] font-mono tracking-[0.2em] uppercase mb-1 font-bold">
                                    Exercise {appState.focusedExercise + 1} of {appState.activeWorkout.exercises.length}
                                </p>
                                <h1 className="font-space text-2xl font-black tracking-tight leading-tight w-64 truncate">{ex.name}</h1>
                            </div>
                            <button onClick={(e) => { triggerRipple(e); AudioEngine.close(); updateState({ focusedExercise: null }); }} className="p-3 mt-2 bg-[#111] rounded-full text-white border border-white/10 active-press transition-transform">
                                <ChevronDown size={20} className="relative z-10"/>
                            </button>
                        </div>

                        <div className="px-6 py-6 relative z-10">
                            <div className="flex flex-col gap-3 mb-8">
                                <div className="flex items-start bg-[#111] p-5 rounded-[24px] border border-white/10 shadow-lg">
                                    <Info size={18} className="text-[#0A84FF] mr-4 mt-0.5 shrink-0" />
                                    <p className="text-[14px] text-[#ccc] font-medium leading-relaxed">{ex.note}</p>
                                </div>
                                {ex.cue && (
                                    <div className="flex items-center bg-[#0A84FF]/10 p-4 rounded-[20px] border border-[#0A84FF]/30 shadow-inner">
                                        <Activity size={16} className="text-[#0A84FF] mr-3 shrink-0" />
                                        <span className="text-[13px] text-[#0A84FF] font-black uppercase tracking-[0.1em]">{ex.cue}</span>
                                    </div>
                                )}
                            </div>

                            <h3 className="text-[11px] font-mono text-[#8e8e93] uppercase tracking-[0.2em] mb-4 font-bold">Set Architecture</h3>
                            <div className="space-y-4">
                                {Array.from({ length: ex.sets }).map((_, setIdx) => {
                                    const isCompleted = exerciseLogs[setIdx]?.completed;
                                    const inputKey = `${ex.id}-${setIdx}`;
                                    const weightVal = appState.inputValues[inputKey]?.weight !== undefined ? appState.inputValues[inputKey].weight : '';
                                    const repsVal = appState.inputValues[inputKey]?.reps !== undefined ? appState.inputValues[inputKey].reps : '';

                                    return (
                                        <div key={setIdx} className={`flex flex-col gap-3 p-5 rounded-[36px] border transition-all duration-300 ${isCompleted ? 'bg-[#000]/50 border-white/5 opacity-60 grayscale' : 'bg-[#111] border-white/10 shadow-2xl'}`}>
                                            <div className="flex items-center justify-between mb-2 px-2">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10 shadow-inner">
                                                        <span className="font-space font-black text-lg text-white">{setIdx + 1}</span>
                                                    </div>
                                                    <span className="text-[11px] font-bold uppercase tracking-widest text-[#8e8e93]">Set Target: <span className="text-white">{ex.reps} Reps</span></span>
                                                </div>
                                            </div>
                                            
                                            <div className="flex gap-3">
                                                <div className="relative flex-1">
                                                    <input type="number" value={weightVal} onChange={(e) => handleInputChange(ex.id, setIdx, 'weight', e.target.value)} disabled={isCompleted} className="w-full h-20 bg-black rounded-[24px] text-center text-3xl font-black font-space text-white border border-white/5 focus:border-[#0A84FF] focus:bg-[#050505] transition-colors pb-1 pt-5 outline-none disabled:bg-transparent disabled:text-white" />
                                                    <span className="absolute top-3 left-1/2 -translate-x-1/2 text-[10px] text-[#8e8e93] uppercase font-bold tracking-widest pointer-events-none">KG</span>
                                                </div>
                                                <div className="relative flex-1">
                                                    <input type="number" placeholder={ex.reps.split('-')[0]} value={repsVal} onChange={(e) => handleInputChange(ex.id, setIdx, 'reps', e.target.value)} disabled={isCompleted} className="w-full h-20 bg-black rounded-[24px] text-center text-3xl font-black font-space text-white border border-white/5 focus:border-[#0A84FF] focus:bg-[#050505] transition-colors pb-1 pt-5 outline-none placeholder:text-white/10 disabled:bg-transparent disabled:text-white" />
                                                    <span className="absolute top-3 left-1/2 -translate-x-1/2 text-[10px] text-[#8e8e93] uppercase font-bold tracking-widest pointer-events-none">Reps</span>
                                                </div>
                                            </div>

                                            <button 
                                                onClick={(e) => toggleSetComplete(ex.id, setIdx, ex.rest, setIdx === ex.sets - 1, e)} 
                                                className={`relative overflow-hidden w-full h-16 rounded-[24px] flex items-center justify-center font-black text-[13px] uppercase tracking-widest transition-all duration-300 active-press mt-2 ${
                                                    isCompleted 
                                                    ? 'bg-[#1c1c1e] text-[#8e8e93] border border-white/10 hover:border-white/20' 
                                                    : 'bg-[#0A84FF] text-white shadow-[0_10px_30px_rgba(10,132,255,0.3)]'
                                                }`}
                                            >
                                                {isCompleted ? (
                                                    <span className="flex items-center font-space relative z-10">
                                                        <RotateCcw size={18} strokeWidth={2.5} className="mr-2"/> Tap to Undo
                                                    </span>
                                                ) : (
                                                    <span className="font-space relative z-10">Complete Set</span>
                                                )}
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderIntelModal = () => {
                if (!intelModalExercise) return null;
                const ex = intelModalExercise;

                return (
                    <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-[100] overflow-y-auto animate-slide-up-full pb-20">
                        <div className="sticky top-0 bg-black/90 backdrop-blur-sm z-10 safe-pt pb-4 px-6 border-b border-white/10 flex justify-between items-center">
                            <div className="mt-2">
                                <span className="text-cyan-400 text-[9px] font-mono tracking-[0.25em] uppercase font-black">Exercise Blueprint</span>
                                <h1 className="font-space text-2xl font-black text-white tracking-tight leading-tight">{ex.name}</h1>
                            </div>
                            <button onClick={(e) => { triggerRipple(e); AudioEngine.close(); setIntelModalExercise(null); }} className="p-3 mt-2 bg-[#111] rounded-full text-white border border-white/10 active-press">
                                <X size={20} />
                            </button>
                        </div>

                        <div className="p-6 space-y-6">
                            {/* Targeted Muscle Segment */}
                            <div className="bg-[#111] p-5 rounded-[28px] border border-white/10 shadow-lg">
                                <div className="flex items-center gap-2 mb-2 text-cyan-400">
                                    <Activity size={16} />
                                    <h4 className="text-[10px] font-mono font-bold uppercase tracking-widest">Anatomical Focus</h4>
                                </div>
                                <p className="text-white font-space font-bold text-lg">{ex.target || 'Primary Compound Target'}</p>
                            </div>

                            {/* Configuration / Setup Block */}
                            <div className="bg-[#111] p-5 rounded-[28px] border border-white/10 shadow-lg">
                                <div className="flex items-center gap-2 mb-2 text-orange-400">
                                    <Cpu size={16} />
                                    <h4 className="text-[10px] font-mono font-bold uppercase tracking-widest">Setup Configuration</h4>
                                </div>
                                <p className="text-[#ccc] text-sm leading-relaxed">{ex.setup || 'Standard hardware gym station alignment.'}</p>
                            </div>

                            {/* Sequential Steps Block */}
                            <div className="bg-[#111] p-5 rounded-[28px] border border-white/10 shadow-lg">
                                <div className="flex items-center gap-2 mb-4 text-[#34C759]">
                                    <TrendingUp size={16} />
                                    <h4 className="text-[10px] font-mono font-bold uppercase tracking-widest">Execution Directives</h4>
                                </div>
                                <div className="space-y-3">
                                    {(ex.steps || ['Assume position with perfect core alignment.', 'Perform execution through a clean range of motion.', 'Control the negative weight vector.']).map((step, idx) => (
                                        <div key={idx} className="flex gap-4 items-start">
                                            <div className="w-6 h-6 rounded-md bg-white/5 text-xs text-white border border-white/10 font-space font-black flex items-center justify-center shrink-0 mt-0.5">{idx + 1}</div>
                                            <p className="text-[#bbb] text-sm leading-relaxed">{step}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Strategy / Pro Notes Block */}
                            <div className="bg-cyan-500/5 p-5 rounded-[28px] border border-cyan-500/20 shadow-lg">
                                <div className="flex items-center gap-2 mb-2 text-cyan-400">
                                    <Info size={16} />
                                    <h4 className="text-[10px] font-mono font-bold uppercase tracking-widest">Hypertrophy Strategy</h4>
                                </div>
                                <p className="text-cyan-200/90 text-sm leading-relaxed font-medium">{ex.note}</p>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <ErrorBoundary>
                    <div className="relative w-full min-h-screen bg-black text-white selection:bg-[#0A84FF]/30 overflow-x-hidden">
                        
                        {/* GLOBAL OVERLAYS */}
                        <DynamicIslandTimer timerState={timerState} skipTimer={skipTimer} toggleTimerMinimize={toggleTimerMinimize} adjustTimer={adjustTimer} />
                        
                        {showAbortModal && (
                            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[999] flex items-center justify-center p-6 animate-fade-in" style={{ transform: 'translateZ(0)' }}>
                                <div className="bg-[#111] border border-[#ff453a]/30 p-8 rounded-[36px] w-full max-w-sm shadow-[0_0_50px_rgba(255,69,58,0.2)] animate-zoom-in-modal text-center">
                                    <div className="w-20 h-20 rounded-full bg-[#ff453a]/10 flex items-center justify-center mb-6 mx-auto border border-[#ff453a]/20">
                                        <X size={36} className="text-[#ff453a]" />
                                    </div>
                                    <h2 className="font-space text-2xl font-black text-white mb-3 tracking-tight">ABORT PROTOCOL?</h2>
                                    <p className="text-[#8e8e93] text-sm mb-10 font-medium leading-relaxed px-2">Are you sure you want to terminate the current session? All tracking data will be permanently lost.</p>
                                    <div className="flex gap-4">
                                        <button onClick={(e) => { triggerRipple(e); AudioEngine.tap(); setShowAbortModal(false); }} className="relative overflow-hidden flex-1 bg-[#222] py-5 rounded-[24px] font-bold text-[13px] uppercase tracking-widest text-white active-press transition-all"><span className="font-space relative z-10">Cancel</span></button>
                                        <button onClick={(e) => { triggerRipple(e); setShowAbortModal(false); endWorkout(); }} className="relative overflow-hidden flex-1 bg-[#ff453a]/20 py-5 rounded-[24px] font-bold text-[13px] uppercase tracking-widest text-[#ff453a] border border-[#ff453a]/30 active-press transition-all"><span className="font-space relative z-10">Terminate</span></button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* INTEL BLUEPRINT SCREEN OVERLAY */}
                        {renderIntelModal()}

                        {/* ROUTING */}
                        {bootState !== 'online' ? renderBootScreen() : (
                            (appState.currentView === 'dashboard' || !appState.activeWorkout) ? renderDashboard() : (
                                <>
                                    {renderWorkoutList()}
                                    {renderFocusMode()}
                                </>
                            )
                        )}
                    </div>
                </ErrorBoundary>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
