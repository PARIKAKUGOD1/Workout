                            <div className="space-y-4">
                                {Array.from({ length: ex.sets }).map((_, setIdx) => {
                                    const isCompleted = exerciseLogs[setIdx]?.completed;
                                    const inputKey = `${ex.id}-${setIdx}`;
                                    const weightVal = appState.inputValues[inputKey]?.weight !== undefined ? appState.inputValues[inputKey].weight : '';
                                    const repsVal = appState.inputValues[inputKey]?.reps !== undefined ? appState.inputValues[inputKey].reps : '';

                                    return (
                                        <div key={setIdx} className={`flex flex-col gap-3 p-4 rounded-[32px] border transition-all duration-300 ${isCompleted ? 'bg-black border-white/5 opacity-50 grayscale' : 'bg-[#111113] border-white/10 shadow-xl'}`}>
                                            <div className="flex items-center justify-between mb-2 px-2">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                                                        <span className="font-mono font-bold text-sm text-[#8e8e93]">{setIdx + 1}</span>
                                                    </div>
                                                    <span className="text-xs font-bold uppercase tracking-widest text-[#8e8e93]">Set Target: <span className="text-white">{ex.reps} Reps</span></span>
                                                </div>
                                            </div>
                                            
                                            <div className="flex gap-3">
                                                <div className="relative flex-1">
                                                    <input type="number" value={weightVal} onChange={(e) => handleInputChange(ex.id, setIdx, 'weight', e.target.value)} disabled={isCompleted} className="w-full h-16 bg-black rounded-[24px] text-center text-2xl font-black font-mono text-white border border-white/5 focus:border-[#0A84FF] transition-colors pb-1 pt-4 outline-none" />
                                                    <span className="absolute top-2 left-1/2 -translate-x-1/2 text-[10px] text-[#8e8e93] uppercase font-bold tracking-widest pointer-events-none">KG</span>
                                                </div>
                                                <div className="relative flex-1">
                                                    <input type="number" placeholder={ex.reps.split('-')[0]} value={repsVal} onChange={(e) => handleInputChange(ex.id, setIdx, 'reps', e.target.value)} disabled={isCompleted} className="w-full h-16 bg-black rounded-[24px] text-center text-2xl font-black font-mono text-white border border-white/5 focus:border-[#0A84FF] transition-colors pb-1 pt-4 outline-none placeholder:text-white/10" />
                                                    <span className="absolute top-2 left-1/2 -translate-x-1/2 text-[10px] text-[#8e8e93] uppercase font-bold tracking-widest pointer-events-none">Reps</span>
                                                </div>
                                            </div>

                                            <button onClick={() => { if(!isCompleted) handleSetComplete(ex.id, setIdx, ex.rest, setIdx === ex.sets - 1); }} disabled={isCompleted} className={`w-full h-14 rounded-[20px] flex items-center justify-center font-black text-sm uppercase tracking-widest transition-all duration-300 active-press mt-1 ${isCompleted ? 'bg-[#34C759] text-black' : 'bg-[#0A84FF] text-white shadow-[0_10px_30px_rgba(10,132,255,0.3)]'}`}>
                                                {isCompleted ? <span className="flex items-center"><Check size={18} strokeWidth={3} className="mr-2"/> Logged</span> : "Complete Set"}
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };

            // --- MASTER RENDER TREE ---
            return (
                <ErrorBoundary>
                    <div className="relative w-full min-h-screen bg-black text-white selection:bg-[#0A84FF]/30">
                        {/* GLOBAL OVERLAYS */}
                        <DynamicIslandTimer timerState={timerState} skipTimer={skipTimer} toggleTimerMinimize={toggleTimerMinimize} adjustTimer={adjustTimer} />
                        
                        {showAbortModal && (
                            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[999] flex items-center justify-center p-6 animate-fade-in">
                                <div className="bg-[#111] border border-[#ff453a]/30 p-6 rounded-[32px] w-full max-w-sm shadow-[0_0_40px_rgba(255,69,58,0.2)] animate-zoom-in-modal">
                                    <div className="w-16 h-16 rounded-full bg-[#ff453a]/10 flex items-center justify-center mb-4 mx-auto border border-[#ff453a]/20">
                                        <X size={32} className="text-[#ff453a]" />
                                    </div>
                                    <h2 className="text-xl font-black text-center text-white mb-2 tracking-tight">ABORT PROTOCOL?</h2>
                                    <p className="text-[#8e8e93] text-[13px] text-center mb-8 font-medium">Are you sure you want to terminate the current session? All tracking data will be lost.</p>
                                    <div className="flex gap-3">
                                        <button onClick={() => { AudioEngine.tap(); setShowAbortModal(false); }} className="flex-1 bg-[#222] py-4 rounded-[20px] font-bold text-sm text-white active-press transition-all">Cancel</button>
                                        <button onClick={() => { setShowAbortModal(false); endWorkout(); }} className="flex-1 bg-[#ff453a]/20 py-4 rounded-[20px] font-bold text-sm text-[#ff453a] border border-[#ff453a]/30 active-press transition-all">Terminate</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ROUTING */}
                        {bootState !== 'online' ? renderBootScreen() : (
                            (appState.currentView === 'dashboard' || !appState.activeWorkout) ? renderDashboard() : (
                                <>
                                    {renderWorkoutList()}
                                    {renderFocusMode()}
                                </>
                            )
                        )}
                    </div>
                </ErrorBoundary>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
